<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }
    
    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(to right, #3f5efb, #fc466b);
        padding: 20px;
    }

    form {
        width: 100%;
        max-width: 400px;
        background: rgba(255, 255, 255, 0.1);
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
        border: 1px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
    }

    h2 {
        text-align: center;
        color: #fff;
        font-weight: 600;
        margin-bottom: 20px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        letter-spacing: 3px;
    }

    label {
        font-size: 14px;
        color: white;
        opacity: 0.8;
        display: block;
        margin-bottom: 5px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    input {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        background: transparent;
        border: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.6);
        color: white;
        font-size: 16px;
        transition: all 0.3s ease;
    }

    input::placeholder {
        color: rgba(255, 255, 255, 0.7);
    }

    input:focus {
        border-bottom: 2px solid #fff;
        outline: none;
    }

    button {
        width: 100%;
        padding: 15px;
        background: rgba(255, 255, 255, 0.8);
        color: #333;
        font-size: 16px;
        font-weight: 500;
        text-transform: uppercase;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    button:hover {
        background: #fff;
        box-shadow: 0 4px 15px rgba(255, 255, 255, 0.3);
    }

    @media (max-width: 768px) {
        form {
            padding: 20px;
        }

        h2 {
            font-size: 20px;
        }

        input {
            font-size: 14px;
        }

        button {
            font-size: 14px;
        }
    }

    @media (max-width: 480px) {
        form {
            padding: 15px;
        }

        h2 {
            font-size: 18px;
        }

        input {
            font-size: 12px;
        }

        button {
            font-size: 12px;
        }
    }
</style>

<form action="register.php" method="POST">
    <h2>REGISTER HERE</h2>

    <label for="username">Username <img src="user.png" style="height: 1rem; width:1rem;"></label>
    <input type="text" id="username" name="username" placeholder="Enter your username" required>

    <label for="email">E-mail <img src="gmail.png" style="height: 1rem; width:1rem;"></label>
    <input type="email" id="email" name="email" placeholder="Enter your email" required>

    <label for="mobile">Mobile <img src="phone.png" style="height: 1rem; width:1rem;"></label>
    <input type="tel" id="mobile" name="mobile" placeholder="Enter your mobile number" required>

    <label for="password">Password <img src="password.png" style="height: 1rem; width:1rem;"></label>
    <input type="password" id="password" name="password" placeholder="Enter a strong password" required>

    <label for="passwordc">Confirm Password <img src="password.png" style="height: 1rem; width:1rem;"></label>
    <input type="password" id="passwordc" name="passwordc" placeholder="Confirm your password" required>

    <button type="submit">Register</button>
</form>

</body>
</html>
